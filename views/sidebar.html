<script>
    (function () {
        const currentPage = window.location.pathname.split('/').pop() || 'dashboard.html';
        const links = document.querySelectorAll('#sidebar-nav .sidebar-link');

        links.forEach(function (link) {
            const page = link.getAttribute('data-page');
            if (page === currentPage) {
                // Style aktif: gradient hijau
                link.classList.remove('hover:bg-slate-100');
                link.classList.add(
                    'bg-gradient-to-r', 'from-green-500', 'to-emerald-400',
                    'shadow-[0_12px_30px_rgba(34,197,94,0.3)]'
                );
                // Icon aktif
                const icon = link.querySelector('.sidebar-icon');
                if (icon) {
                    icon.classList.remove('bg-slate-100', 'group-hover:bg-white', 'text-slate-500');
                    icon.classList.add('bg-white/20', 'backdrop-blur-md', 'text-white', 'border', 'border-white/20');
                }
                // Teks aktif
                const title = link.querySelector('.sidebar-title');
                if (title) {
                    title.classList.remove('text-slate-700', 'group-hover:text-slate-900');
                    title.classList.add('text-white');
                }
                const sub = link.querySelector('.sidebar-sub');
                if (sub) {
                    sub.classList.remove('text-slate-400');
                    sub.classList.add('text-green-50');
                }
            }
        });
    })();
</script>
